name: purge gh.123778 release cache

on:
  release:
    types:
      - published
      - edited
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to purge, for example v0.2.4
        required: true
        type: string

permissions:
  contents: read

env:
  CDN_RELEASE_BASE_URL: https://gh.123778.xyz/serial-scope/releases

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: resolve-tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ inputs.tag }}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "No release tag was provided."
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${tag}"

      - name: Build purge URL list
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          base = os.environ["CDN_RELEASE_BASE_URL"].rstrip("/")

          assets = [
              "latest.json",
              "serial-scope-windows-x86_64-portable.exe",
              "serial-scope-windows-x86_64-setup.exe",
              "serial-scope-linux-x86_64.tar.gz",
              "serial-scope-macos.app.zip",
          ]

          urls = [f"{base}/latest/download/latest.json"]
          urls.extend(f"{base}/download/{tag}/{asset}" for asset in assets)

          Path("purge-urls.json").write_text(
              json.dumps(urls, ensure_ascii=False),
              encoding="utf-8",
          )

          print(f"Prepared {len(urls)} purge URLs for {tag}.")
          for url in urls:
              print(url)
          PY
        env:
          RELEASE_TAG: ${{ steps.resolve-tag.outputs.tag }}

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "CLOUDFLARE_API_TOKEN is not set."
            exit 1
          fi

          if [[ -z "${CLOUDFLARE_ZONE_ID:-}" ]]; then
            echo "CLOUDFLARE_ZONE_ID is not set."
            exit 1
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          urls = json.loads(Path("purge-urls.json").read_text(encoding="utf-8"))
          Path("purge-payload.json").write_text(
              json.dumps({"files": urls}, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

          curl --fail-with-body --silent --show-error \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @purge-payload.json
