name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: serial-scope-windows-x86_64
            binary_path: target/release/serial-scope.exe
            asset_name: serial-scope-windows-x86_64.exe
          - os: ubuntu-latest
            artifact_name: serial-scope-linux-x86_64
            binary_path: target/release/serial-scope
            asset_name: serial-scope-linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            pkg-config

      - name: Build release
        run: cargo build --release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          append_body: true
          body: |
            Automated release build for `${{ github.ref_name }}`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
