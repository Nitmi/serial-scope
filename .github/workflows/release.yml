name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            pkg-config

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --locked

  build:
    name: Build ${{ matrix.os }}
    needs: validate
    runs-on: ${{ matrix.os }}
    env:
      WINDOWS_SIGN_CERT_B64: ${{ secrets.WINDOWS_SIGN_CERT_B64 }}
      WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: serial-scope-windows
            package_paths: |
              dist/serial-scope-windows-x86_64-portable.exe
              dist/serial-scope-windows-x86_64-setup.exe
          - os: ubuntu-latest
            artifact_name: serial-scope-linux-x86_64
            package_paths: dist/serial-scope-linux-x86_64.tar.gz
          - os: macos-latest
            artifact_name: serial-scope-macos
            package_paths: dist/serial-scope-macos.app.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            pkg-config

      - name: Build release
        run: cargo build --release --locked

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Prepare Windows signing certificate
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_CERT_B64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_CERT_PASSWORD)) {
            "WINDOWS_SIGNING_ENABLED=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Windows code signing secrets not configured; skipping signing."
            exit 0
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "serial-scope-codesign.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:WINDOWS_SIGN_CERT_B64))
          "WINDOWS_SIGN_CERT_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WINDOWS_SIGNING_ENABLED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign Windows app binary
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/') && env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: powershell
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /f $env:WINDOWS_SIGN_CERT_PATH /p $env:WINDOWS_SIGN_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "target\release\serial-scope.exe"

      - name: Package Windows bundle
        if: runner.os == 'Windows'
        shell: cmd
        run: packaging\windows\package-windows.bat

      - name: Sign Windows installer
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/') && env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: powershell
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /f $env:WINDOWS_SIGN_CERT_PATH /p $env:WINDOWS_SIGN_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "dist\serial-scope-windows-x86_64-setup.exe"

      - name: Package Linux bundle
        if: runner.os == 'Linux'
        run: bash packaging/linux/package-linux.sh

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        run: bash packaging/macos/package-macos.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_paths }}
          if-no-files-found: error

  publish_release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog entry
        shell: bash
        run: |
          mkdir -p dist
          python - <<'PY'
          import pathlib
          import os

          version = os.environ["GITHUB_REF_NAME"].lstrip("v")
          lines = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          header_prefix = f"## [{version}] - "

          start = None
          for index, line in enumerate(lines):
              if line.startswith(header_prefix):
                  start = index + 1
                  break

          if start is None:
              raise SystemExit(
                  f"CHANGELOG.md 中未找到版本 [{version}]，请先补充对应条目后再发布。"
              )

          end = len(lines)
          for index in range(start, len(lines)):
              if lines[index].startswith("## ["):
                  end = index
                  break

          changelog_body = "\n".join(lines[start:end]).strip()
          if not changelog_body:
              raise SystemExit(
                  f"CHANGELOG.md 中版本 [{version}] 的条目为空，请补充发布说明后再发布。"
              )

          tag = os.environ["GITHUB_REF_NAME"]
          release_base = f"https://github.com/Nitmi/serial-scope/releases/download/{tag}"
          download_guide = f"""## 下载

| 平台 | 推荐下载 | 说明 |
| --- | --- | --- |
| Windows | [下载安装版（推荐）]({release_base}/serial-scope-windows-x86_64-setup.exe) | 适合大多数 Windows 用户，会安装到固定目录并创建快捷方式。 |
| Windows | [下载便携版]({release_base}/serial-scope-windows-x86_64-portable.exe) | 无需安装，适合临时使用或放在 U 盘中运行。 |
| Linux x86_64 | [下载 tar.gz]({release_base}/serial-scope-linux-x86_64.tar.gz) | 解压后运行 `serial-scope`。 |
| macOS | [下载 app.zip]({release_base}/serial-scope-macos.app.zip) | 解压后运行 `Serial Scope.app`。 |

## 更新内容
"""

          pathlib.Path("dist/changelog-notes.md").write_text(
              changelog_body + "\n", encoding="utf-8"
          )
          pathlib.Path("dist/release-notes.md").write_text(
              download_guide + "\n" + changelog_body + "\n", encoding="utf-8"
          )
          PY

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-assets
          merge-multiple: true

      - name: Generate latest.json
        shell: bash
        run: |
          mkdir -p dist/release-assets
          python - <<'PY'
          import json
          import os
          import pathlib

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag.lstrip("v")
          notes = pathlib.Path("dist/changelog-notes.md").read_text(encoding="utf-8").strip()

          assets = {
              "windows-x86_64": "serial-scope-windows-x86_64-portable.exe",
              "linux-x86_64": "serial-scope-linux-x86_64.tar.gz",
              "macos": "serial-scope-macos.app.zip",
          }

          def urls(name: str):
              github_url = f"https://github.com/Nitmi/serial-scope/releases/download/{tag}/{name}"
              return [
                  f"https://gh.123778.xyz/serial-scope/releases/download/{tag}/{name}",
                  github_url,
                  f"https://gh-proxy.org/{github_url}",
                  f"https://hk.gh-proxy.org/{github_url}",
                  f"https://edgeone.gh-proxy.org/{github_url}",
              ]

          latest = {
              "version": version,
              "notes": notes,
              "assets": {
                  key: {
                      "name": value,
                      "download_urls": urls(value),
                  }
                  for key, value in assets.items()
              },
          }

          with open("dist/release-assets/latest.json", "w", encoding="utf-8") as fh:
              json.dump(latest, fh, ensure_ascii=False, indent=2)
          PY
      - name: Create or update GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          assets=(
            "dist/release-assets/serial-scope-windows-x86_64-portable.exe"
            "dist/release-assets/serial-scope-windows-x86_64-setup.exe"
            "dist/release-assets/serial-scope-linux-x86_64.tar.gz"
            "dist/release-assets/serial-scope-macos.app.zip"
            "dist/release-assets/latest.json"
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file "dist/release-notes.md"
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes-file "dist/release-notes.md"
          fi

          gh release upload "$tag" "${assets[@]}" --clobber

  purge_release_cache:
    name: Purge gh.123778 release cache
    needs: publish_release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      CDN_RELEASE_BASE_URL: https://gh.123778.xyz/serial-scope/releases

    steps:
      - name: Build purge URL list
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          base = os.environ["CDN_RELEASE_BASE_URL"].rstrip("/")

          assets = [
              "latest.json",
              "serial-scope-windows-x86_64-portable.exe",
              "serial-scope-windows-x86_64-setup.exe",
              "serial-scope-linux-x86_64.tar.gz",
              "serial-scope-macos.app.zip",
          ]

          urls = [f"{base}/latest/download/latest.json"]
          urls.extend(f"{base}/download/{tag}/{asset}" for asset in assets)

          Path("purge-payload.json").write_text(
              json.dumps({"files": urls}, ensure_ascii=False),
              encoding="utf-8",
          )

          print(f"Prepared {len(urls)} purge URLs for {tag}.")
          for url in urls:
              print(url)
          PY

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "CLOUDFLARE_API_TOKEN is not set."
            exit 1
          fi

          if [[ -z "${CLOUDFLARE_ZONE_ID:-}" ]]; then
            echo "CLOUDFLARE_ZONE_ID is not set."
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @purge-payload.json
